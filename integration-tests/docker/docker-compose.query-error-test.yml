version: "2.2"
services:
  robux-zookeeper-kafka:
    extends:
      file: docker-compose.base.yml
      service: robux-zookeeper-kafka

  robux-metadata-storage:
    extends:
      file: docker-compose.base.yml
      service: robux-metadata-storage
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka

  robux-overlord:
    extends:
      file: docker-compose.base.yml
      service: robux-overlord
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-coordinator:
    extends:
      file: docker-compose.base.yml
      service: robux-coordinator
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-overlord
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-broker:
    extends:
      file: docker-compose.base.yml
      service: robux-broker
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka
      - robux-historical-for-query-error-test

  robux-router:
    extends:
      file: docker-compose.base.yml
      service: robux-router
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka
      - robux-coordinator
      - robux-broker

  robux-historical-for-query-error-test:
    image: robux/cluster
    container_name: robux-historical-for-query-error-test
    networks:
      robux-it-net:
        ipv4_address: 172.172.172.14
    ports:
      - 8086:8083 #8084 is used by mono service on GHA runners
      - 8284:8283
      - 5010:5007
    privileged: true
    volumes:
      - ${HOME}/shared:/shared
      - ./service-supervisords/robux.conf:/usr/lib/robux/conf/robux.conf
    env_file:
      - ./environment-configs/common
      - ./environment-configs/historical-for-query-error-test
      - ${OVERRIDE_ENV}
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka

networks:
  robux-it-net:
    name: robux-it-net
    ipam:
      config:
        - subnet: 172.172.172.0/24