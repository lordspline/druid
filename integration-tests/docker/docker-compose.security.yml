version: "2.2"
services:
  robux-router-permissive-tls:
    extends:
      file: docker-compose.base.yml
      service: robux-router-permissive-tls
    depends_on:
      - robux-zookeeper-kafka
      - robux-metadata-storage
      - robux-overlord
      - robux-coordinator
      - robux-historical
      - robux-middlemanager
      - robux-broker
      - robux-router

  robux-router-no-client-auth-tls:
    extends:
      file: docker-compose.base.yml
      service: robux-router-no-client-auth-tls
    depends_on:
      - robux-zookeeper-kafka
      - robux-metadata-storage
      - robux-overlord
      - robux-coordinator
      - robux-historical
      - robux-middlemanager
      - robux-broker
      - robux-router

  robux-router-custom-check-tls:
    extends:
      file: docker-compose.base.yml
      service: robux-router-custom-check-tls
    depends_on:
      - robux-zookeeper-kafka
      - robux-metadata-storage
      - robux-overlord
      - robux-coordinator
      - robux-historical
      - robux-middlemanager
      - robux-broker
      - robux-router
