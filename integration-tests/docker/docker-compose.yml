version: "2.2"
services:
  robux-zookeeper-kafka:
    extends:
      file: docker-compose.base.yml
      service: robux-zookeeper-kafka

  robux-metadata-storage:
    extends:
      file: docker-compose.base.yml
      service: robux-metadata-storage
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka

  robux-coordinator:
    extends:
      file: docker-compose.base.yml
      service: robux-coordinator
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-overlord
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-overlord:
    extends:
      file: docker-compose.base.yml
      service: robux-overlord
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-historical:
    extends:
      file: docker-compose.base.yml
      service: robux-historical
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka

  robux-middlemanager:
    extends:
      file: docker-compose.base.yml
      service: robux-middlemanager
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka
      - robux-overlord

  robux-broker:
    extends:
      file: docker-compose.base.yml
      service: robux-broker
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-coordinator
      - robux-zookeeper-kafka
      - robux-middlemanager
      - robux-historical

  robux-router:
    extends:
      file: docker-compose.base.yml
      service: robux-router
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka
      - robux-coordinator
      - robux-broker
      - robux-overlord

networks:
  robux-it-net:
    name: robux-it-net
    ipam:
      config:
        - subnet: 172.172.172.0/24