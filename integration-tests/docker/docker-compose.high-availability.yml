version: "2.2"
services:
  robux-zookeeper-kafka:
    extends:
      file: docker-compose.base.yml
      service: robux-zookeeper-kafka

  robux-metadata-storage:
    extends:
      file: docker-compose.base.yml
      service: robux-metadata-storage
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-zookeeper-kafka

  robux-coordinator:
    extends:
      file: docker-compose.base.yml
      service: robux-coordinator
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
      - ROBUX_LOG_PATH=/shared/logs/ha-coordinator-one.log
      - robux_manager_config_pollDuration=PT10S
      - robux_manager_rules_pollDuration=PT10S
      - robux_manager_segments_pollDuration=PT10S
      - robux_coordinator_period=PT10S
    depends_on:
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-coordinator-two:
    extends:
      file: docker-compose.base.yml
      service: robux-coordinator-two
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
      - ROBUX_LOG_PATH=/shared/logs/ha-coordinator-two.log
      - robux_host=robux-coordinator-two
      - robux_manager_config_pollDuration=PT10S
      - robux_manager_rules_pollDuration=PT10S
      - robux_manager_segments_pollDuration=PT10S
      - robux_coordinator_period=PT10S
    depends_on:
      - robux-coordinator
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-overlord:
    extends:
      file: docker-compose.base.yml
      service: robux-overlord
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
      - ROBUX_LOG_PATH=/shared/logs/ha-overlord-one.log
    depends_on:
      - robux-coordinator
      - robux-coordinator-two
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-overlord-two:
    extends:
      file: docker-compose.base.yml
      service: robux-overlord-two
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
      - ROBUX_LOG_PATH=/shared/logs/ha-overlord-two.log
      - robux_host=robux-overlord-two
    depends_on:
      - robux-coordinator
      - robux-coordinator-two
      - robux-metadata-storage
      - robux-zookeeper-kafka

  robux-broker:
    extends:
      file: docker-compose.base.yml
      service: robux-broker
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-coordinator
      - robux-coordinator-two
      - robux-overlord
      - robux-overlord-two
      - robux-zookeeper-kafka

  robux-router:
    extends:
      file: docker-compose.base.yml
      service: robux-router
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
    depends_on:
      - robux-coordinator
      - robux-coordinator-two
      - robux-overlord
      - robux-overlord-two
      - robux-broker

  robux-custom-node-role:
    image: robux/cluster
    container_name: robux-custom-node-role
    networks:
      robux-it-net:
        ipv4_address: 172.172.172.90
    ports:
      - 50011:50011
      - 9301:9301
      - 9501:9501
    privileged: true
    volumes:
      - ${HOME}/shared:/shared
      - ./service-supervisords/robux.conf:/usr/lib/robux/conf/robux.conf
    environment:
      - ROBUX_INTEGRATION_TEST_GROUP=${ROBUX_INTEGRATION_TEST_GROUP}
      - ROBUX_SERVICE=custom-node-role
      - ROBUX_LOG_PATH=/shared/logs/custom-node-role.log
      - SERVICE_ROBUX_JAVA_OPTS=-server -Xmx128m -Xms128m -XX:+UseG1GC -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5011
      - robux_host=robux-custom-node-role
      - robux_auth_basic_common_cacheDirectory=/tmp/authCache/custom_node_role
      - robux_server_https_crlPath=/tls/revocations.crl
    env_file:
      - ./environment-configs/common
      - ${OVERRIDE_ENV}
    depends_on:
      - robux-zookeeper-kafka
      - robux-coordinator
      - robux-coordinator-two

networks:
  robux-it-net:
    name: robux-it-net
    ipam:
      config:
        - subnet: 172.172.172.0/24