robux.service=robux/historical
robux.plaintextPort=8083

# HTTP server threads
robux.server.http.numThreads=60

# Processing threads and buffers
robux.processing.buffer.sizeBytes=500MiB
robux.processing.numMergeBuffers=16
robux.processing.numThreads=63
robux.processing.tmpDir=var/robux/processing

# Segment storage
robux.segmentCache.locations=[{"path":"var/robux/segment-cache","maxSize":"300g"}]

# Query cache
robux.historical.cache.useCache=true
robux.historical.cache.populateCache=true
robux.cache.type=caffeine
robux.cache.sizeInBytes=2GiB
