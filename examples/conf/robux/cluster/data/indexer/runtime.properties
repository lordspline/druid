robux.service=robux/indexer
robux.plaintextPort=8091

# Number of tasks per indexer
robux.worker.capacity=4

# Task launch parameters
robux.worker.baseTaskDirs=[\"var/robux/task\"]

# HTTP server threads
robux.server.http.numThreads=60

# Processing threads and buffers on Indexer
robux.processing.numMergeBuffers=2
robux.processing.buffer.sizeBytes=100MiB
robux.processing.numThreads=4

# Hadoop indexing
robux.indexer.task.hadoopWorkingPath=var/robux/hadoop-tmp
